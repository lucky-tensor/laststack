name: UI Kit Build Test

on:
  push:
    branches:
      - demo/ui-kit
  pull_request:
    branches:
      - demo/ui-kit

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM and Clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 llvm-18 lld-18

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          cd demo/ui-kit
          bun install
          bunx playwright install --with-deps chromium

      - name: Run UI Kit Build
        run: |
          chmod +x demo/ui-kit/build.sh
          # Set CLANG_CMD to clang-18 for the script
          export CLANG_CMD=clang-18
          ./demo/ui-kit/build.sh

      - name: Run Screenshot Capture
        run: |
          cd demo/ui-kit
          # capture.bun.ts expects the html file as first arg
          bun run scripts/capture.bun.ts index.html ci-capture

      - name: Upload Capture Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ui-kit-capture
          path: /tmp/laststack-captures/ci-capture/
