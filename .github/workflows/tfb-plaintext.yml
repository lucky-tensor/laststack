name: tfb-plaintext

on:
  push:
    branches: [tfb-plaintext-llvmir]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (LLVM, wrk, Rust)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang build-essential pkg-config libssl-dev curl wrk
          curl https://sh.rustup.rs -sSf | sh -s -- -y >/tmp/rustup.log
          source $HOME/.cargo/env
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup default stable

      - name: Build LLVM plaintext demo
        working-directory: demo/plaintext
        run: |
          bash build.sh

      - name: Build Hyper baseline
        working-directory: demo/plaintext/hyper
        run: |
          cargo build --release

      - name: Run LLVM plaintext workload
        working-directory: demo/plaintext
        run: |
          bash run-benchmark.sh llvmir ./laststack-plaintext

      - name: Dump LLVM artifacts
        if: always()
        working-directory: demo/plaintext
        run: |
          ls -al artifacts || true
          cat artifacts/llvmir-server.log || true
          tail -n 40 artifacts/benchmark-summary.md || true

      - name: Run Hyper baseline workload
        working-directory: demo/plaintext
        run: |
          bash run-benchmark.sh hyper 8081 hyper/target/release/laststack_plaintext_hyper

      - name: Dump Hyper artifacts
        if: always()
        working-directory: demo/plaintext
        run: |
          ls -al artifacts || true
          cat artifacts/hyper-server.log || true
          tail -n 40 artifacts/benchmark-summary.md || true

      - name: Show benchmark summaries
        working-directory: demo/plaintext/artifacts
        run: |
          for file in *.csv; do
            echo "=== $file ==="
            cat "$file"
          done

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tfb-plaintext-results
          path: demo/plaintext/artifacts/
