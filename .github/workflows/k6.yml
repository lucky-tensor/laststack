name: k6-smoke

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  k6:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # allow committing updated benchmark snapshot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps (k6, LLVM/Clang, jq)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ca-certificates curl gnupg jq clang llvm lld
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /etc/apt/keyrings/k6.gpg
          echo "deb [signed-by=/etc/apt/keyrings/k6.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -y
          sudo apt-get install -y k6

      - name: Build demo server
        working-directory: demo
        run: |
          bash build.sh

      - name: Run k6 scenarios (1-VU and 1000-VU)
        working-directory: demo
        env:
          TARGET_URL: http://127.0.0.1:9090/
        run: |
          # start server in background
          ./laststack-server >/tmp/laststack-server.log 2>&1 &
          echo $! > /tmp/laststack-server.pid
          trap 'kill $(cat /tmp/laststack-server.pid) 2>/dev/null || true; echo "--- laststack-server.log ---"; cat /tmp/laststack-server.log || true' EXIT
          sleep 2

          cat > single.js <<'EOF'
          import http from 'k6/http';
          import { check } from 'k6';

          export const options = {
            vus: 1,
            duration: '10s',
            thresholds: {},
          };

          const target = __ENV.TARGET_URL || 'http://127.0.0.1:9090/';

          export default function () {
            const res = http.get(target);
            check(res, { 'status 200': (r) => r.status === 200 });
          }
          EOF

          cat > load1000.js <<'EOF'
          import http from 'k6/http';
          import { check } from 'k6';

          export const options = {
            scenarios: {
              high_conc: {
                executor: 'constant-vus',
                vus: 1000,
                duration: '10s',
              },
            },
            thresholds: {},
          };

          const target = __ENV.TARGET_URL || 'http://127.0.0.1:9090/';

          export default function () {
            const res = http.get(target);
            check(res, { 'status 200': (r) => r.status === 200 });
          }
          EOF

          k6 run --summary-export k6-single.json single.js
          k6 run --summary-export k6-1000.json load1000.js

      - name: Print key metrics
        if: always()
        working-directory: demo
        run: |
          summarize() {
            local file=$1
            local label=$2
            if [ -f "$file" ]; then
              local rps
              rps=$(jq '.metrics.http_reqs.rate' "$file")
              local p95
              p95=$(jq '.metrics.http_req_duration["p(95)"]' "$file")
              echo "$label RPS: $rps"
              echo "$label p95 latency (s): $p95"
            else
              echo "$label: summary file $file not found"
            fi
          }

          summarize k6-single.json "single"
          summarize k6-1000.json "1000vus"

      - name: Write benchmark.md
        if: always()
        run: |
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SINGLE_RPS=$(jq '.metrics.http_reqs.rate' demo/k6-single.json)
          SINGLE_P95=$(jq '.metrics.http_req_duration["p(95)"]' demo/k6-single.json)
          CONC_RPS=$(jq '.metrics.http_reqs.rate' demo/k6-1000.json)
          CONC_P95=$(jq '.metrics.http_req_duration["p(95)"]' demo/k6-1000.json)

          [ -f benchmark.md ] && cp benchmark.md /tmp/benchmark_prev.md || true

          {
            echo "# Benchmarks"
            echo "Run: $DATE"
            echo ""
            echo "| scenario | rps | p95_latency_s |"
            echo "|---|---:|---:|"
            echo "| single_vu | $SINGLE_RPS | $SINGLE_P95 |"
            echo "| 1000_vus | $CONC_RPS | $CONC_P95 |"
            echo ""
            if [ -f /tmp/benchmark_prev.md ]; then
              echo "## Previous runs";
              cat /tmp/benchmark_prev.md
            fi
          } > benchmark.md

      - name: Commit benchmark.md
        if: github.ref == 'refs/heads/master'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- benchmark.md; then
            echo "No benchmark changes to commit."
            exit 0
          fi
          git add benchmark.md
          git commit -m "chore: update benchmark snapshot [skip ci]"
          git push origin HEAD:master

      - name: Upload k6 summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary
          path: |
            demo/k6-single.json
            demo/k6-1000.json
            benchmark.md
