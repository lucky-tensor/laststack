name: k6-smoke

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  k6:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps (k6, LLVM/Clang, jq)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ca-certificates curl gnupg jq clang llvm lld
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /etc/apt/keyrings/k6.gpg
          echo "deb [signed-by=/etc/apt/keyrings/k6.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -y
          sudo apt-get install -y k6

      - name: Build demo server
        working-directory: demo
        run: |
          bash build.sh

      - name: Run k6 against local server
        working-directory: demo
        env:
          TARGET_URL: http://127.0.0.1:9090/
        run: |
          # start server in background
          ./laststack-server >/tmp/laststack-server.log 2>&1 &
          echo $! > /tmp/laststack-server.pid
          trap 'kill $(cat /tmp/laststack-server.pid) 2>/dev/null || true; echo "--- laststack-server.log ---"; cat /tmp/laststack-server.log || true' EXIT
          sleep 2

          cat > smoke.js <<'EOF'
          import http from 'k6/http';
          import { check, sleep } from 'k6';

          export const options = {
            vus: 2,
            duration: '10s',
            thresholds: {
              http_req_failed: ['rate<=0.01'],
              http_req_duration: ['p(95)<500'],
            },
          };

          const target = __ENV.TARGET_URL || 'https://test.k6.io';

          export default function () {
            const res = http.get(target);
            check(res, { 'status 200': (r) => r.status === 200 });
            sleep(1);
          }
          EOF

          k6 run --summary-export k6-summary.json smoke.js

      - name: Upload k6 summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary
          path: demo/k6-summary.json

      - name: Print key metrics
        if: always()
        working-directory: demo
        run: |
          if [ -f k6-summary.json ]; then
            echo "p95 latency (ms):" $(jq '.metrics.http_req_duration["p(95)"]' k6-summary.json)
            echo "error rate:" $(jq '.metrics.http_req_failed.rate' k6-summary.json)
          else
            echo "k6-summary.json not found"
          fi
