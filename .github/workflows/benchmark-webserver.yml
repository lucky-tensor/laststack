name: benchmark-webserver

on:
  schedule:
    - cron: '53 5 * * *' # Nightly at 05:53 UTC
  workflow_dispatch:

jobs:
  k6-benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps (k6, LLVM/Clang, jq)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ca-certificates curl gnupg jq clang llvm lld
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /etc/apt/keyrings/k6.gpg
          echo "deb [signed-by=/etc/apt/keyrings/k6.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -y
          sudo apt-get install -y k6

      - name: Build demo server
        working-directory: demo/webserver
        run: |
          bash build.sh

      - name: Run k6 scenarios
        working-directory: demo/webserver
        env:
          TARGET_URL: http://127.0.0.1:9090/
        run: |
          # start server in background
          ./alienstack-server >/tmp/alienstack-server.log 2>&1 &
          echo $! > /tmp/alienstack-server.pid
          trap 'kill $(cat /tmp/alienstack-server.pid) 2>/dev/null || true; echo "--- alienstack-server.log ---"; cat /tmp/alienstack-server.log || true' EXIT
          sleep 2

          cat > single.js <<'EOF'
          import http from 'k6/http';
          import { check } from 'k6';
          export const options = { vus: 1, duration: '10s' };
          const target = __ENV.TARGET_URL || 'http://127.0.0.1:9090/';
          export default function () {
            const res = http.get(target);
            check(res, { 'status 200': (r) => r.status === 200 });
          }
          EOF

          cat > steady.js <<'EOF'
          import http from 'k6/http';
          import { check } from 'k6';
          export const options = {
            scenarios: {
              steady_state: {
                executor: 'constant-arrival-rate',
                rate: 3000,
                timeUnit: '1s',
                duration: '10s',
                preAllocatedVUs: 200,
                maxVUs: 1000,
              },
            },
          };
          const target = __ENV.TARGET_URL || 'http://127.0.0.1:9090/';
          export default function () {
            const res = http.get(target);
            check(res, { 'status 200': (r) => r.status === 200 });
          }
          EOF

          k6 run --summary-export k6-single.json single.js
          k6 run --summary-export k6-steady.json steady.js

      - name: Print key metrics
        if: always()
        working-directory: demo/webserver
        run: |
          summarize() {
            local file=$1
            local label=$2
            if [ -f "$file" ]; then
              local rps=$(jq '.metrics.http_reqs.rate' "$file")
              local p95=$(jq '.metrics.http_req_duration["p(95)"]' "$file")
              echo "$label RPS: $rps"
              echo "$label p95 latency (s): $p95"
            fi
          }
          summarize k6-single.json "single"
          summarize k6-steady.json "steady_state"

      - name: Upload k6 summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webserver-benchmark-results
          path: |
            demo/webserver/k6-single.json
            demo/webserver/k6-steady.json
