name: benchmark-plaintext

on:
  schedule:
    - cron: '27 5 * * *' # Nightly at 05:27 UTC
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (LLVM, wrk, Rust)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang build-essential pkg-config libssl-dev curl wrk
          curl https://sh.rustup.rs -sSf | sh -s -- -y >/tmp/rustup.log
          source $HOME/.cargo/env
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup default stable

      - name: Build LLVM plaintext demo
        working-directory: demo/plaintext
        run: |
          bash build.sh

      - name: Build Hyper baseline
        working-directory: demo/plaintext/hyper
        run: |
          cargo build --release

      - name: Run LLVM plaintext workload
        working-directory: demo/plaintext
        run: |
          bash run-benchmark.sh llvmir ./alienstack-plaintext

      - name: Run Hyper baseline workload
        working-directory: demo/plaintext
        run: |
          bash run-benchmark.sh hyper 8081 hyper/target/release/alienstack_plaintext_hyper

      - name: Show benchmark summaries
        working-directory: demo/plaintext/artifacts
        run: |
          for file in *.csv; do
            echo "=== $file ==="
            cat "$file"
          done

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: plaintext-benchmark-results
          path: demo/plaintext/artifacts/
