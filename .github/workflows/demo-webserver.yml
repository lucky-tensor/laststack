name: demo-webserver

on:
  push:
    branches: [master, ci/demo-verification]
  pull_request:
    branches: [master]
  schedule:
    - cron: '42 3 * * *' # Nightly at 03:42 UTC
  workflow_dispatch:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang llvm lld curl jq

      - name: Build and Verify
        working-directory: demo/webserver
        run: |
          bash build.sh

      - name: Test Server Response
        working-directory: demo/webserver
        run: |
          ./alienstack-server > server.log 2>&1 &
          PID=$!
          sleep 2
          RESPONSE=$(curl -s http://127.0.0.1:9090/)
          kill $PID
          # The webserver returns an HTML page with title starting with "Alien Stack"
          if [[ "$RESPONSE" == *"<title>Alien Stack"* ]]; then
            echo "✓ UI Response matches expected output"
          else
            echo "✗ Unexpected response content"
            echo "$RESPONSE" | head -n 20
            cat server.log
            exit 1
          fi

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webserver-reports
          path: |
            demo/webserver/verification-report.json
            demo/webserver/link-gate-report.json
            demo/webserver/artifacts/manifest.json
