<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Reference - Forms</title>
</head>
<body class="bg-gray-50 min-h-screen p-8">

    <h1 class="text-3xl font-bold text-gray-900 mb-8">Form Examples</h1>

    <!-- Input Fields -->
    <section class="mb-12">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Text Input</h2>
        
        <div class="space-y-4 max-w-lg">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Default</label>
                <input type="text" class="border border-gray-300 rounded px-3 py-2 w-full" placeholder="Enter text">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">With Value</label>
                <input type="text" class="border border-gray-300 rounded px-3 py-2 w-full" value="Hello World">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Disabled</label>
                <input type="text" class="border border-gray-300 rounded px-3 py-2 w-full bg-gray-100" disabled value="Disabled">
            </div>
        </div>
    </section>

    <!-- Input States -->
    <section class="mb-12">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Input States</h2>
        
        <div class="space-y-4 max-w-lg">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Focus</label>
                <input type="text" class="border border-gray-300 rounded px-3 py-2 w-full focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500" value="Focused">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Error</label>
                <input type="text" class="border border-red-500 rounded px-3 py-2 w-full focus:outline-none focus:ring-2 focus:ring-red-500" value="Error state">
                <p class="text-red-500 text-sm mt-1">This field is required</p>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Success</label>
                <input type="text" class="border border-green-500 rounded px-3 py-2 w-full focus:outline-none focus:ring-2 focus:ring-green-500" value="Valid input">
            </div>
        </div>
    </section>

    <!-- Input Sizes -->
    <section class="mb-12">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Input Sizes</h2>
        
        <div class="space-y-4 max-w-lg">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Small</label>
                <input type="text" class="border border-gray-300 rounded px-2 py-1 text-sm w-full" placeholder="Small">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Default</label>
                <input type="text" class="border border-gray-300 rounded px-3 py-2 w-full" placeholder="Default">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Large</label>
                <input type="text" class="border border-gray-300 rounded px-4 py-3 text-lg w-full" placeholder="Large">
            </div>
        </div>
    </section>

    <!-- Textarea -->
    <section class="mb-12">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Textarea</h2>
        
        <div class="max-w-lg">
            <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
            <textarea class="border border-gray-300 rounded px-3 py-2 w-full h-32 resize-none focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500" placeholder="Enter your message"></textarea>
        </div>
    </section>

    <!-- Select -->
    <section class="mb-12">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Select</h2>
        
        <div class="space-y-4 max-w-lg">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Choose Option</label>
                <select class="border border-gray-300 rounded px-3 py-2 w-full focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500">
                    <option>Select one...</option>
                    <option>Option 1</option>
                    <option>Option 2</option>
                    <option>Option 3</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">With Value</label>
                <select class="border border-gray-300 rounded px-3 py-2 w-full focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500">
                    <option selected>Option 1</option>
                    <option>Option 2</option>
                    <option>Option 3</option>
                </select>
            </div>
        </div>
    </section>

    <!-- Checkbox & Radio -->
    <section class="mb-12">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Checkbox & Radio</h2>
        
        <div class="space-y-4 max-w-lg">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Checkbox</label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                    <span>Option 1</span>
                </label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500" checked>
                    <span>Option 2 (checked)</span>
                </label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500" disabled>
                    <span>Disabled</span>
                </label>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Radio</label>
                <label class="flex items-center gap-2">
                    <input type="radio" name="radio-group" class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                    <span>Option A</span>
                </label>
                <label class="flex items-center gap-2">
                    <input type="radio" name="radio-group" class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500" checked>
                    <span>Option B (selected)</span>
                </label>
                <label class="flex items-center gap-2">
                    <input type="radio" name="radio-group-2" class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500" disabled>
                    <span>Disabled</span>
                </label>
            </div>
        </div>
    </section>

    <!-- Form with Labels -->
    <section class="mb-12">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Complete Form</h2>
        
        <form class="max-w-lg space-y-4 bg-white p-6 rounded-lg shadow">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" class="border border-gray-300 rounded px-3 py-2 w-full focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500" placeholder="John Doe">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" class="border border-gray-300 rounded px-3 py-2 w-full focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500" placeholder="john@example.com">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                <select class="border border-gray-300 rounded px-3 py-2 w-full focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500">
                    <option>General Inquiry</option>
                    <option>Support</option>
                    <option>Feedback</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
                <textarea class="border border-gray-300 rounded px-3 py-2 w-full h-24 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500" placeholder="Your message..."></textarea>
            </div>
            
            <label class="flex items-center gap-2">
                <input type="checkbox" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                <span class="text-sm text-gray-600">I agree to the terms</span>
            </label>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded">
                Submit
            </button>
        </form>
    </section>

    <!-- Floating Label -->
    <section class="mb-12">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Floating Labels</h2>
        
        <div class="max-w-lg space-y-4">
            <div class="relative">
                <input type="text" class="border border-gray-300 rounded px-3 py-3 w-full peer focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500" placeholder=" ">
                <label class="absolute left-3 top-3 text-gray-500 text-sm transition-all peer-placeholder-shown:text-base peer-placeholder-shown:top-3 peer-focus:top-0 peer-focus:text-sm peer-focus:text-blue-500 peer-focus:-translate-y-2 bg-white px-1">
                    Floating Label
                </label>
            </div>
        </div>
    </section>

</body>
</html>
