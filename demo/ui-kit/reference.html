<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Reference - Tailwind CSS</title>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-8">
    
    <!-- Card Component -->
    <div class="bg-white shadow-lg rounded-xl p-8 max-w-md w-full mx-auto border border-gray-200">
        <h1 class="text-2xl font-bold text-gray-900 mb-6">UI Kit Demo</h1>
        
        <!-- Form -->
        <form class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="text" 
                       class="w-full border border-gray-300 rounded-lg px-4 py-3 text-gray-900 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500"
                       placeholder="Enter your email">
            </div>
            
            <!-- Button -->
            <button type="button" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg shadow-sm mt-4">
                Submit
            </button>
        </form>
    </div>

</body>
</html>
