<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Demo</title>
</head>
<body id="root">
<script type="module">
const handles = new Map();
let next_handle = 1;
handles.set(1, document.getElementById('root'));

let wasmExports = null;
let memory = null;

const getStr = (ptr, len) => new TextDecoder('utf-8').decode(new Uint8Array(memory.buffer, ptr, len));

const env = {
    dom_create: (tag_ptr, tag_len) => {
        const node = document.createElement(getStr(tag_ptr, tag_len));
        const handle = ++next_handle;
        handles.set(handle, node);
        console.log('created', getStr(tag_ptr, tag_len), 'handle', handle);
        return handle;
    },
    dom_append: (parent, child) => {
        console.log('append', parent, '->', child);
        handles.get(parent).appendChild(handles.get(child));
    },
    dom_set_text: (node, p, len) => { 
        console.log('set_text', node, getStr(p, len));
        handles.get(node).textContent = getStr(p, len); 
    },
    dom_set_attr: (node, k_p, k_l, v_p, v_l) => {
        const key = getStr(k_p, k_l);
        const val = getStr(v_p, v_l);
        console.log('set_attr', node, key, '=', val);
        handles.get(node).style[key] = val;
    },
    dom_listen: (node_handle, event_id) => {},
    dom_remove: (n) => { handles.get(n).remove(); handles.delete(n); },
    perf_now: () => performance.now(),
    raf_request: (cb_id) => {}
};

WebAssembly.instantiateStreaming(fetch('view.wasm'), { env })
    .then(res => {
        console.log('Wasm loaded');
        wasmExports = res.instance.exports;
        memory = wasmExports.memory;
        wasmExports.init();
        console.log('init called');
    })
    .catch(e => console.error('Wasm error:', e));
</script>
</body>
</html>
