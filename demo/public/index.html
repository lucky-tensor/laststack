<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LastStack • fractal.wasm</title>
  <style>
    :root { color-scheme: light; }
    body { margin: 0; padding: 12px; font-family: monospace; background: #f8f8f8; }
    header { margin-bottom: 8px; }
    h1 { margin: 0; font-size: 18px; }
    small { color: #444; }
    canvas { width: 100%; max-width: 960px; border: 1px solid #222; background: #000; image-rendering: pixelated; display: block; }
    #status { margin-top: 8px; white-space: pre; }
  </style>
</head>
<body>
  <header>
    <h1>fractal.wasm</h1>
    <small>Pixels come straight from WASM; JS only blits to canvas.</small>
  </header>
  <canvas id="canvas" width="640" height="360"></canvas>
  <pre id="status">Loading wasm…</pre>

  <script>
    const WIDTH = 640;
    const HEIGHT = 360;
    const STATUS = document.getElementById('status');
    const ctx = document.getElementById('canvas').getContext('2d');

    const set = (msg) => STATUS.textContent = msg;

    function ensureMemory(memory, bytes) {
      const page = 65536;
      const need = Math.ceil((bytes - memory.buffer.byteLength) / page);
      if (need > 0) memory.grow(need);
    }

    async function main() {
      try {
        const res = await fetch('/fractal.wasm');
        if (!res.ok) throw new Error('fetch /fractal.wasm failed');
        const bytes = await res.arrayBuffer();
        const { instance } = await WebAssembly.instantiate(bytes, {});
        const wasm = instance.exports;

        ensureMemory(wasm.memory, WIDTH * HEIGHT * 4);
        const frameData = ctx.createImageData(WIDTH, HEIGHT);

        let frame = 0;
        const tick = () => {
          const maxIter = 32 + (frame % 224); // simple color drift over time
          const ptr = wasm.generate_fractal(WIDTH, HEIGHT, maxIter);
          const view = new Uint8Array(wasm.memory.buffer, ptr, WIDTH * HEIGHT * 4);
          frameData.data.set(view);
          ctx.putImageData(frameData, 0, 0);
          set(`frame ${frame.toString().padStart(4, '0')}  max_iter ${maxIter}`);
          frame += 1;
          requestAnimationFrame(tick);
        };

        tick();
      } catch (err) {
        set(`error: ${err.message}`);
      }
    }

    main();
  </script>
</body>
</html>
